<section class="page">
  <div class="header">
    <div>
      <h1>Nuevo contrato</h1>
      <p>Registra la información principal del contrato.</p>
    </div>

    <a class="btn-secondary" routerLink="/contratos">Volver</a>
  </div>

  <form class="form-card" [formGroup]="form" (ngSubmit)="guardar()">
    <div class="grid">
      <label>
        Número de contrato
        <input type="text" formControlName="numeroContrato">
      </label>

      <label>
        Título
        <input type="text" formControlName="titulo">
      </label>

      <label>
        Tipo
        <select formControlName="tipo">
          <option value="Servicio">Servicio</option>
          <option value="Obra">Obra</option>
          <option value="Suministro">Suministro</option>
        </select>
      </label>

      <label>
        Estado
        <select formControlName="estado">
          <option value="Vigente">Vigente</option>
          <option value="Aprobado">Aprobado</option>
          <option value="Pendiente">Pendiente</option>
          <option value="Finalizado">Finalizado</option>
        </select>
      </label>

      <label>
        Fecha de inicio
        <input type="date" formControlName="fechaInicio">
      </label>

      <label>
        Fecha de fin
        <input type="date" formControlName="fechaFin">
      </label>

      <label>
        Monto
        <input type="number" formControlName="monto">
      </label>

      <label>
        Contratista
        <input type="text" formControlName="contratistaNombre">
      </label>
    </div>

    <div class="actions">
      <button type="submit" class="btn-primary">Guardar</button>
    </div>
  </form>
</section>

<div class="error" *ngIf="form.get('nombre')?.touched && form.get('nombre')?.invalid">
  Este campo es obligatorio.
</div>
