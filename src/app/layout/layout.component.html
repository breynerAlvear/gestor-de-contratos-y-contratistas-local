<div class="app-shell">
  <aside class="sidebar" [class.open]="sidebarOpen">
    <div class="brand">
      <div class="logo">MC</div>
      <div>
        <h1>M&C Gestión</h1>
        <p>Administración de contratos</p>
      </div>
    </div>

    <nav class="menu">
      <a
        routerLink="/dashboard"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="closeSidebar()">
        Dashboard
      </a>

      <a
        routerLink="/contratistas"
        routerLinkActive="active"
        (click)="closeSidebar()">
        Contratistas
      </a>

      <a
        routerLink="/contratos"
        routerLinkActive="active"
        (click)="closeSidebar()">
        Contratos
      </a>
    </nav>
  </aside>

  <div class="overlay" *ngIf="sidebarOpen" (click)="closeSidebar()"></div>

  <main class="content">
    <header class="topbar">
      <button class="menu-btn" type="button" (click)="toggleSidebar()">☰</button>

      <div>
        <h2>Sistema interno</h2>
        <p>Panel administrativo</p>
      </div>
    </header>

    <section class="page">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>
