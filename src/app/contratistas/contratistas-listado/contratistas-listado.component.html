<div class="page-header">
  <div>
    <h2>Contratistas</h2>
    <p>Gestiona los contratistas registrados en el sistema.</p>
  </div>

  <a class="btn-primary" routerLink="/contratistas/nuevo">Nuevo contratista</a>
</div>

<div class="table-card">
  <table *ngIf="(contratistas$ | async) as contratistas">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Documento</th>
        <th>Cargo</th>
        <th>Email</th>
        <th>Teléfono</th>
        <th>Acciones</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let contratista of contratistas">
        <td>{{ contratista.nombre }}</td>
        <td>{{ contratista.documento }}</td>
        <td>{{ contratista.cargo }}</td>
        <td>{{ contratista.email }}</td>
        <td>{{ contratista.telefono }}</td>
        <td>
          <button type="button" class="btn-danger" (click)="eliminar(contratista.id)">
            Eliminar
          </button>
        </td>
      </tr>
    </tbody>
  </table>

  <div class="empty-state" *ngIf="(contratistas$ | async)?.length === 0">
    No hay contratistas registrados.
  </div>
</div>
